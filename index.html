<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c0c0b">
<title>Marathon '26</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0b;--surface:#141412;--surface2:#1a1a17;
  --border:#252522;--border2:#2e2e2a;
  --green:#4a9e6b;--green-dim:#1e3d2a;--green-glow:rgba(74,158,107,0.10);--green-text:#6abf87;
  --amber:#c8863a;--amber-dim:#5a3a15;--amber-text:#e09a50;
  --red:#b83030;--blue:#3d7ab5;--blue-text:#6aaae0;
  --purple:#7a5ab8;--purple-text:#a080d8;
  --plyo:#e07a30;--plyo-dim:#5a2e10;--plyo-text:#f09050;
  --text:#e6e4dc;--text-dim:#8a8880;--text-muted:#4a4a45;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;}
#shell{position:fixed;inset:0;display:grid;grid-template-rows:auto 1fr auto;}
#topBar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;padding-top:env(safe-area-inset-top,0px);}
#viewPort{position:relative;overflow:hidden;}
#bottomNav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);}
.view{position:absolute;inset:0;overflow-y:scroll;-webkit-overflow-scrolling:touch;display:none;}
.view.active{display:block;}
#weekDetailView,#workoutView{overflow-y:hidden;}
#weekDetailView .view-flex,#workoutView .view-flex{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;cursor:pointer;border:none;background:none;color:var(--text-muted);}
.nav-btn.active{color:var(--amber);}
.nav-icon{font-size:19px;}
.nav-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}
.logo em{color:var(--amber);font-style:normal;}
.overall-ring{position:relative;width:34px;height:34px;}
.overall-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border2);stroke-width:3;}
.ring-fill{fill:none;stroke:var(--amber);stroke-width:3;stroke-linecap:round;}
.ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:8px;color:var(--amber-text);font-weight:500;}
::-webkit-scrollbar{display:none;}*{scrollbar-width:none;}

/* WEEK LIST */
.phase-header{padding:18px 20px 6px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;background:var(--bg);position:sticky;top:0;z-index:2;}
.week-card{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px;cursor:pointer;display:flex;align-items:center;gap:13px;position:relative;overflow:hidden;user-select:none;}
.week-card:active{opacity:0.7;}
.week-card.current-week{border-color:var(--amber-dim);}
.week-card.current-week::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--amber);border-radius:3px 0 0 3px;}
.week-ring{position:relative;width:42px;height:42px;flex-shrink:0;}
.week-ring svg{transform:rotate(-90deg);}
.wring-bg{fill:none;stroke:var(--border2);stroke-width:3.5;}
.wring-fill{fill:none;stroke-width:3.5;stroke-linecap:round;}
.week-ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:var(--text-dim);}
.week-ring-label.done{color:var(--green-text);}
.week-card-body{flex:1;min-width:0;}
.week-card-top{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap;}
.week-card-num{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;}
.week-card-phase{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:1px;padding:2px 6px;border-radius:3px;border:1px solid;text-transform:uppercase;}
.week-badges{display:flex;gap:4px;}
.badge{font-size:12px;}
.week-card-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}
.week-card-meta strong{color:var(--text-dim);}
.week-card-chevron{color:var(--text-muted);font-size:16px;flex-shrink:0;}
.pc-REBUILD{color:var(--green-text);border-color:var(--green-dim);}
.pc-BASE{color:var(--blue-text);border-color:#1e3a5e;}
.pc-QUALITY{color:var(--amber-text);border-color:var(--amber-dim);}
.pc-AMSTERDAM{color:#e07060;border-color:#5a2020;}
.pc-RECOVERY{color:var(--purple-text);border-color:#3a2a5a;}
.pc-TAPER{color:var(--blue-text);border-color:#1e3a5e;}
.pc-RACE{color:var(--green-text);border-color:var(--green-dim);}

/* DETAIL */
.detail-header{padding:14px 20px 10px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.detail-back{display:flex;align-items:center;gap:6px;color:var(--amber-text);font-size:14px;cursor:pointer;margin-bottom:10px;width:fit-content;}
.detail-back:active{opacity:0.7;}
.detail-title-row{display:flex;align-items:baseline;gap:10px;margin-bottom:5px;}
.detail-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:2px;line-height:1;}
.detail-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;padding:3px 8px;border-radius:3px;border:1px solid;text-transform:uppercase;}
.detail-stats{display:flex;gap:18px;}
.stat{display:flex;flex-direction:column;gap:1px;}
.stat-key{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
.stat-val{font-size:14px;font-weight:500;}
.detail-progress{display:flex;align-items:center;gap:10px;padding:9px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.dp-bar{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.dp-fill{height:100%;background:var(--green);border-radius:2px;}
.dp-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);white-space:nowrap;}
.detail-scroll{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding:12px 16px 32px;}
.section-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin:14px 0 7px;}

/* DAY CARD */
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.day-card.full-done{border-color:var(--green-dim);background:var(--green-glow);}
.day-card-header{display:flex;align-items:center;gap:10px;padding:11px 15px 8px;}
.day-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--text-muted);min-width:28px;text-transform:uppercase;flex-shrink:0;}
.day-text{font-size:13px;line-height:1.4;flex:1;}
.day-pct{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);flex-shrink:0;}
.day-activities{display:flex;flex-wrap:wrap;gap:6px;padding:0 15px 11px;}
.act-pill{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:20px;border:1px solid;cursor:pointer;user-select:none;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.5px;text-transform:uppercase;}
.act-pill:active{opacity:0.7;}
.act-pill.unchecked{background:transparent;color:var(--text-muted);border-color:var(--border2);}
.act-pill.run.checked{color:#fff;background:var(--blue);border-color:var(--blue);}
.act-pill.strength.checked{color:#fff;background:#b83030;border-color:#b83030;}
.act-pill.plyo.checked{color:#fff;background:var(--plyo);border-color:var(--plyo);}
.act-pill.stairmaster.checked{color:#fff;background:var(--purple);border-color:var(--purple);}
.act-pill.yoga.checked{color:#fff;background:var(--green);border-color:var(--green);}
.act-pill.rest.checked{color:#fff;background:var(--text-muted);border-color:var(--text-muted);}
.act-pill.race.checked{color:#fff;background:var(--amber);border-color:var(--amber);}
.act-check{width:12px;height:12px;border-radius:3px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;}
.act-pill.checked .act-check::after{content:'✓';}
.info-cards{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;}
.info-card.amber-accent{border-left:3px solid var(--amber);}
.info-card.green-accent{border-left:3px solid var(--green);cursor:pointer;}
.info-card.green-accent:active{opacity:0.7;}
.info-card-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:7px;}
.info-card-body{font-size:13px;color:var(--text-dim);line-height:1.6;}

/* STATS */
.stats-pad{padding:18px 16px 32px;}
.stats-hero{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;display:flex;align-items:center;gap:18px;}
.big-ring{position:relative;width:76px;height:76px;flex-shrink:0;}
.big-ring svg{transform:rotate(-90deg);}
.big-ring-bg{fill:none;stroke:var(--border2);stroke-width:6;}
.big-ring-fill{fill:none;stroke:var(--amber);stroke-width:6;stroke-linecap:round;}
.big-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.big-ring-pct{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--amber-text);letter-spacing:1px;}
.big-ring-sub{font-family:'DM Mono',monospace;font-size:8px;color:var(--text-muted);}
.stats-hero-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:4px;}
.stats-hero-sub{font-size:13px;color:var(--text-dim);line-height:1.5;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
.stat-card-val{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;line-height:1;margin-bottom:3px;}
.stat-card-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;}
.race-countdown{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
.section-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:12px;}
.countdown-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.countdown-item:last-child{border-bottom:none;}
.countdown-race{display:flex;align-items:center;gap:10px;}
.race-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.race-dot.amsterdam{background:var(--red);}
.race-dot.philly{background:var(--green);}
.countdown-name{font-size:13px;font-weight:500;}
.countdown-sub{font-size:11px;color:var(--text-muted);}
.countdown-num{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;text-align:right;}
.countdown-days-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-muted);text-align:right;}
.phase-breakdown{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;}
.phase-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.phase-row-label{font-size:11px;color:var(--text-dim);min-width:70px;}
.phase-bar-wrap{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;}
.phase-bar-fill{height:100%;border-radius:2px;}
.phase-row-pct{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);min-width:28px;text-align:right;}

/* PACING */
.pacing-pad{padding:18px 16px 32px;}
.pacing-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:10px;}
.pacing-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.pacing-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pacing-card-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;}
.pacing-pace{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;margin-bottom:5px;}
.pacing-feel{font-size:13px;color:var(--text-dim);margin-bottom:6px;line-height:1.5;}
.pacing-use{font-size:12px;color:var(--text-muted);font-style:italic;}
.race-strategy{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:10px;}
.race-strategy-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;margin-bottom:12px;}
.split-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.split-row:last-child{border-bottom:none;}
.split-miles{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);min-width:60px;}
.split-pace{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;min-width:65px;}
.split-note{font-size:12px;color:var(--text-dim);line-height:1.4;}

/* WORKOUT */
.workout-selectors{background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px 0;flex-shrink:0;}
.week-select-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px;}
.workout-selector-row{display:flex;gap:6px;overflow-x:scroll;-webkit-overflow-scrolling:touch;padding-bottom:10px;}
.week-chip{flex-shrink:0;font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);color:var(--text-muted);cursor:pointer;background:var(--surface);}
.week-chip.active{background:var(--amber);border-color:var(--amber);color:var(--bg);font-weight:600;}
.week-chip.has-log{border-color:var(--green-dim);color:var(--green-text);}
.week-chip.active.has-log{background:var(--amber);color:var(--bg);}
.session-tabs{display:flex;gap:6px;padding-bottom:12px;}
.session-tab{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-align:center;position:relative;}
.session-tab.active{background:var(--surface2);border-color:var(--amber);color:var(--amber-text);}
.session-tab.has-log::after{content:'';position:absolute;top:5px;right:6px;width:5px;height:5px;background:var(--green);border-radius:50%;}
.workout-scroll{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;}
.workout-content{padding:14px 16px 32px;}
.workout-phase-header{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:14px;}
.wph-top{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
.wph-week{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1;}
.wph-phase{font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:3px;border:1px solid;text-transform:uppercase;}
.wph-freq{font-size:12px;color:var(--text-dim);margin-bottom:3px;}
.wph-note{font-size:12px;color:var(--text-muted);font-style:italic;}
.session-header-banner{border-radius:10px;padding:12px 15px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.session-header-banner.strength-banner{background:rgba(184,48,48,0.10);border:1px solid #5a2020;}
.session-header-banner.plyo-banner{background:rgba(224,122,48,0.10);border:1px solid var(--plyo-dim);}
.shb-icon{font-size:24px;}
.shb-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.shb-sub{font-size:11px;color:var(--text-muted);margin-top:2px;font-style:italic;}
.empty-week{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:10px;}
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.ex-header{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;user-select:none;}
.ex-header:active{opacity:0.7;}
.ex-status{width:20px;height:20px;border-radius:5px;border:2px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;}
.ex-status.logged{background:var(--green);border-color:var(--green);color:white;}
.ex-status.plyo-logged{background:var(--plyo);border-color:var(--plyo);color:white;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:600;margin-bottom:2px;}
.ex-prescribed{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);}
.ex-log-summary{font-family:'DM Mono',monospace;font-size:10px;margin-top:2px;}
.strength-color{color:var(--amber-text);}
.plyo-color{color:var(--plyo-text);}
.ex-chevron{color:var(--text-muted);font-size:14px;flex-shrink:0;}
.ex-chevron.open{transform:rotate(90deg);}
.ex-notes{font-size:12px;color:var(--text-muted);font-style:italic;padding:0 15px 8px;line-height:1.5;}
.ex-logger{border-top:1px solid var(--border);padding:12px 15px;}
.log-sets{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.log-set-row{display:flex;align-items:center;gap:8px;}
.log-set-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);min-width:36px;}
.log-input-group{display:flex;gap:6px;flex:1;}
.log-input-wrap{display:flex;flex-direction:column;gap:3px;flex:1;}
.log-input-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}
.log-input{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:7px 10px;color:var(--text);font-family:'DM Mono',monospace;font-size:13px;width:100%;outline:none;text-align:center;}
.log-input:focus{border-color:var(--amber);}
.log-input.plyo-input:focus{border-color:var(--plyo);}
.log-input::placeholder{color:var(--text-muted);}
.log-add-set{display:flex;gap:8px;margin-bottom:10px;}
.log-btn{flex:1;padding:9px;border-radius:7px;border:1px solid;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
.log-btn:active{opacity:0.7;}
.log-btn.add{background:transparent;border-color:var(--border2);color:var(--text-muted);}
.log-btn.save-strength{background:var(--amber);border-color:var(--amber);color:var(--bg);font-weight:600;}
.log-btn.save-plyo{background:var(--plyo);border-color:var(--plyo);color:var(--bg);font-weight:600;}
.log-btn.clear{background:transparent;border-color:var(--border2);color:var(--text-muted);flex:0 0 60px;}
</style>
</head>
<body>
<div id="shell">
  <div id="topBar">
    <div class="logo">MARATHON <em>'26</em></div>
    <div class="overall-ring">
      <svg width="34" height="34" viewBox="0 0 34 34">
        <circle class="ring-bg" cx="17" cy="17" r="13"/>
        <circle class="ring-fill" id="overallRingFill" cx="17" cy="17" r="13" stroke-dasharray="81.68" stroke-dashoffset="81.68"/>
      </svg>
      <div class="ring-text" id="overallPct">0%</div>
    </div>
  </div>
  <div id="viewPort">
    <div id="weekListView" class="view active"><div id="weekListContent" style="padding-bottom:24px"></div></div>
    <div id="weekDetailView" class="view">
      <div class="view-flex">
        <div class="detail-header" id="detailHeader"></div>
        <div class="detail-progress" id="detailProgress"></div>
        <div class="detail-scroll" id="detailScroll"></div>
      </div>
    </div>
    <div id="statsView" class="view"><div class="stats-pad" id="statsContent"></div></div>
    <div id="pacingView" class="view"><div class="pacing-pad" id="pacingContent"></div></div>
    <div id="workoutView" class="view">
      <div class="view-flex">
        <div class="workout-selectors">
          <div class="week-select-label">Week</div>
          <div class="workout-selector-row" id="weekScroller"></div>
          <div class="session-tabs" id="sessionTabs"></div>
        </div>
        <div class="workout-scroll"><div class="workout-content" id="workoutContent"></div></div>
      </div>
    </div>
  </div>

// ── STATE ─────────────────────────────────────────────────────────────────────
// actState: { "w1_mon_run": true, "w1_mon_yoga": false, ... }
let actState={}, workoutLogs={};
let currentView='weeks', currentWeek=null, currentWorkoutWeek=1, currentWorkoutSession=null, expandedExercise=null;

function akey(wk,dayId,act){return `w${wk}_${dayId}_${act}`;}
function wkey(wk,sd,t,id){return `wk${wk}_${sd}_${t}_${id}`;}

function load(){
  try{const s=localStorage.getItem('m26-acts');if(s)actState=JSON.parse(s);}catch(e){}
  // migrate old binary day state if present
  try{const old=localStorage.getItem('m26-sched');if(old){const o=JSON.parse(old);Object.entries(o).forEach(([k,v])=>{if(v){const m=k.match(/^w(\d+)_(\w+)$/);if(m){const wk=+m[1],dayId=m[2];const day=SCHEDULE.find(w=>w.wk===wk)?.days.find(d=>d.id===dayId);if(day)day.activities.forEach(a=>{actState[akey(wk,dayId,a)]=true;});}}});}}catch(e){}
  try{const w=localStorage.getItem('m26-workouts');if(w)workoutLogs=JSON.parse(w);}catch(e){}
}
function saveA(){try{localStorage.setItem('m26-acts',JSON.stringify(actState));}catch(e){}}
function saveW(){try{localStorage.setItem('m26-workouts',JSON.stringify(workoutLogs));}catch(e){}}
function daysUntil(d){return Math.max(0,Math.ceil((d-new Date())/86400000));}

// ── SCORING ───────────────────────────────────────────────────────────────────
// Score a single day: weighted fraction of activities completed
// rest/race days: if marked, score = 0.95 (rest) or 1.0 (race)
function dayScore(wk, day){
  const acts=day.activities;
  if(acts.includes('race')){return actState[akey(wk,day.id,'race')]?1.0:0;}
  if(acts.length===1&&acts[0]==='rest'){return actState[akey(wk,day.id,'rest')]?0.95:0;}
  // weighted activities
  let totalW=0, doneW=0;
  acts.forEach(a=>{
    const w=ACT_WEIGHTS[a]||0;
    totalW+=w;
    if(actState[akey(wk,day.id,a)])doneW+=w;
  });
  if(totalW===0)return 0;
  return doneW/totalW;
}

function weekScore(w){
  const scores=w.days.map(d=>dayScore(w.wk,d));
  return scores.reduce((a,b)=>a+b,0)/scores.length;
}

function overallScore(){
  const scores=SCHEDULE.map(w=>weekScore(w));
  return scores.reduce((a,b)=>a+b,0)/scores.length;
}

function dayFullyDone(wk,day){return dayScore(wk,day)>=0.999;}
function weekFullyDone(w){return w.days.every(d=>dayFullyDone(w.wk,d));}

function hasWorkoutLog(wk){return Object.keys(workoutLogs).some(k=>k.startsWith(`wk${wk}_`));}
function sessionHasLog(wk,sd){return Object.keys(workoutLogs).some(k=>k.startsWith(`wk${wk}_${sd}_`));}
function getSessionKeys(wk){return Object.keys(WORKOUTS[wk]?.sessions||{});}
function phaseColor(p){return{REBUILD:'#4a9e6b',BASE:'#3d7ab5',QUALITY:'#c8863a',AMSTERDAM:'#b83030',RECOVERY:'#7a5ab8',TAPER:'#3d7ab5',RACE:'#4a9e6b'}[p]||'#888';}

  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  const vm={weeks:'weekListView',detail:'weekDetailView',stats:'statsView',pacing:'pacingView',workout:'workoutView'};
  const nm={weeks:'navWeeks',detail:'navWeeks',stats:'navStats',pacing:'navPacing',workout:'navWorkout'};
  document.getElementById(vm[v]).classList.add('active');
  document.getElementById(nm[v]).classList.add('active');
  if(v==='weeks')renderWeekList();
  else if(v==='detail')renderDetail();
  else if(v==='stats')renderStats();
  else if(v==='pacing')renderPacing();
  else if(v==='workout'){renderWorkoutWeekChips();renderSessionTabs();renderWorkoutContent();}
  updateOverall();
}

// ── WEEK LIST ─────────────────────────────────────────────────────────────────
function renderWeekList(){
  const firstInc=SCHEDULE.find(w=>!weekFullyDone(w));
  let html='', lastPhase=null;
  SCHEDULE.forEach(w=>{
    if(w.phase!==lastPhase){html+=`<div class="phase-header">${PHASE_LABELS[w.phase]||w.phase}</div>`;lastPhase=w.phase;}
    const pct=Math.round(weekScore(w)*100);
    const done=weekFullyDone(w);
    const c=2*Math.PI*15, off=c-(pct/100)*c;
    const isCur=firstInc&&w.wk===firstInc.wk;
    const hasPlyo=w.days.some(d=>d.activities.includes('plyo'));
    const hasLog=hasWorkoutLog(w.wk);
    let sub=`${w.mi} mi/week`;
    if(w.phase==='AMSTERDAM')sub='B Race · 3:20–3:25';
    if(w.phase==='RACE')sub='A Race · Sub-3:10';
    html+=`<div class="week-card${isCur?' current-week':''}" onclick="openWeek(${w.wk})">
      <div class="week-ring"><svg width="42" height="42" viewBox="0 0 42 42"><circle class="wring-bg" cx="21" cy="21" r="15"/><circle class="wring-fill" cx="21" cy="21" r="15" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" style="stroke:${done?'var(--green)':pct>0?'var(--amber)':'var(--border2)'}"/></svg><div class="week-ring-label${done?' done':''}">${done?'✓':pct+'%'}</div></div>
      <div class="week-card-body"><div class="week-card-top"><div class="week-card-num">WEEK ${w.wk}</div><div class="week-card-phase pc-${w.phase}">${w.phase}</div><div class="week-badges">${hasPlyo?'<span class="badge">🦘</span>':''}${hasLog?'<span class="badge">💪</span>':''}</div></div><div class="week-card-meta">${sub} · <strong>${pct}% complete</strong></div></div>
      <div class="week-card-chevron">›</div></div>`;
  });
  document.getElementById('weekListContent').innerHTML=html;
}

function openWeek(wk){currentWeek=wk;showView('detail');}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function renderDetail(){
  const w=SCHEDULE.find(x=>x.wk===currentWeek);if(!w)return;
  const pct=Math.round(weekScore(w)*100);
  document.getElementById('detailHeader').innerHTML=`<div class="detail-back" onclick="showView('weeks')">‹ All Weeks</div><div class="detail-title-row"><div class="detail-title">WEEK ${w.wk}</div><div class="detail-badge pc-${w.phase}">${w.phase}</div></div><div class="detail-stats"><div class="stat"><div class="stat-key">Target Miles</div><div class="stat-val">${w.mi} mi</div></div><div class="stat"><div class="stat-key">Complete</div><div class="stat-val">${pct}%</div></div></div>`;
  document.getElementById('detailProgress').innerHTML=`<span class="dp-label">WEEK</span><div class="dp-bar"><div class="dp-fill" style="width:${pct}%"></div></div><span class="dp-label">${pct}%</span>`;
  let html='<div class="section-label">Daily Schedule</div>';
  w.days.forEach(d=>{
    const ds=Math.round(dayScore(w.wk,d)*100);
    const allDone=dayFullyDone(w.wk,d);
    html+=`<div class="day-card${allDone?' full-done':''}">
      <div class="day-card-header">
        <div class="day-label">${d.label}</div>
        <div class="day-text">${d.text}</div>
        <div class="day-pct">${ds}%</div>
      </div>
      <div class="day-activities">`;
    d.activities.forEach(act=>{
      const k=akey(w.wk,d.id,act);
      const checked=!!actState[k];
      html+=`<div class="act-pill ${act} ${checked?'checked':'unchecked'}" onclick="toggleAct(${w.wk},'${d.id}','${act}')">
        <div class="act-check"></div>
        ${ACT_ICONS[act]||''} ${ACT_LABELS[act]||act}
      </div>`;
    });
    html+=`</div></div>`;
  });
  html+=`<div class="section-label">Week Notes</div><div class="info-cards"><div class="info-card amber-accent"><div class="info-card-label">📋 Coach Notes</div><div class="info-card-body">${w.notes}</div></div><div class="info-card green-accent" onclick="goToWorkout(${w.wk})"><div class="info-card-label">💪 Strength + Plyo</div><div class="info-card-body">Tap to open gym sessions for week ${w.wk} →</div></div></div>`;
  document.getElementById('detailScroll').innerHTML=html;
}

function toggleAct(wk,dayId,act){
  const k=akey(wk,dayId,act);
  actState[k]=!actState[k];
  saveA();renderDetail();updateOverall();
}

function goToWorkout(wk){
  currentWorkoutWeek=wk;
  const keys=getSessionKeys(wk);
  currentWorkoutSession=keys[0]||null;
  expandedExercise=null;
  showView('workout');
}

// ── WORKOUT ───────────────────────────────────────────────────────────────────
function renderWorkoutWeekChips(){
  let html='';
  for(let wk=1;wk<=24;wk++){
    const a=wk===currentWorkoutWeek?' active':'';
    const l=hasWorkoutLog(wk)?' has-log':'';
    html+=`<div class="week-chip${a}${l}" onclick="selectWorkoutWeek(${wk})">W${wk}</div>`;
  }
  const sc=document.getElementById('weekScroller');
  sc.innerHTML=html;
  setTimeout(()=>{const chips=sc.querySelectorAll('.week-chip');if(chips[currentWorkoutWeek-1])chips[currentWorkoutWeek-1].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},50);
}

function renderSessionTabs(){
  const keys=getSessionKeys(currentWorkoutWeek);
  if(!keys.length){document.getElementById('sessionTabs').innerHTML='';return;}
  if(!currentWorkoutSession||!keys.includes(currentWorkoutSession))currentWorkoutSession=keys[0];
  let html='';
  keys.forEach(dk=>{
    const sess=WORKOUTS[currentWorkoutWeek].sessions[dk];
    const a=dk===currentWorkoutSession?' active':'';
    const l=sessionHasLog(currentWorkoutWeek,dk)?' has-log':'';
    html+=`<div class="session-tab${a}${l}" onclick="selectSession('${dk}')">${sess.label}<br><span style="font-size:9px;opacity:0.7">${sess.day}</span></div>`;
  });
  document.getElementById('sessionTabs').innerHTML=html;
}

function selectWorkoutWeek(wk){
  currentWorkoutWeek=wk;currentWorkoutSession=null;expandedExercise=null;
  const keys=getSessionKeys(wk);if(keys.length)currentWorkoutSession=keys[0];
  renderWorkoutWeekChips();renderSessionTabs();renderWorkoutContent();
}
function selectSession(dk){currentWorkoutSession=dk;expandedExercise=null;renderSessionTabs();renderWorkoutContent();}

function renderWorkoutContent(){
  const w=WORKOUTS[currentWorkoutWeek];
  const sched=SCHEDULE.find(x=>x.wk===currentWorkoutWeek);
  if(!w){document.getElementById('workoutContent').innerHTML='<div class="empty-week">No data.</div>';return;}
  const keys=getSessionKeys(currentWorkoutWeek);
  if(!keys.length){document.getElementById('workoutContent').innerHTML=`<div class="workout-phase-header"><div class="wph-top"><div class="wph-week">WEEK ${currentWorkoutWeek}</div><div class="wph-phase pc-${sched?.phase||''}">${w.phase}</div></div></div><div class="empty-week">No strength or plyo this week.</div>`;return;}
  const sess=w.sessions[currentWorkoutSession];
  if(!sess){document.getElementById('workoutContent').innerHTML='<div class="empty-week">Select a session above.</div>';return;}
  let html=`<div class="workout-phase-header"><div class="wph-top"><div class="wph-week">WEEK ${currentWorkoutWeek}</div><div class="wph-phase pc-${sched?.phase||''}">${w.phase}</div></div><div class="wph-freq">${sess.label} — ${sess.day}</div></div>`;
  if(sess.strength&&sess.strength.length){
    html+=`<div class="session-header-banner strength-banner"><div class="shb-icon">💪</div><div><div class="shb-title">STRENGTH</div><div class="shb-sub">${sess.label}</div></div></div>`;
    sess.strength.forEach(ex=>html+=renderExCard(currentWorkoutWeek,currentWorkoutSession,'str',ex,false));
  }
  if(sess.plyo&&sess.plyo.length){
    html+=`<div class="session-header-banner plyo-banner" style="margin-top:16px"><div class="shb-icon">🦘</div><div><div class="shb-title">PLYOMETRICS</div><div class="shb-sub">${sess.plyoNote||''}</div></div></div>`;
    sess.plyo.forEach(ex=>html+=renderExCard(currentWorkoutWeek,currentWorkoutSession,'ply',ex,true));
  }else if(sess.plyoNote){
    html+=`<div class="empty-week" style="margin-top:14px;font-size:12px">🦘 ${sess.plyoNote}</div>`;
  }
  document.getElementById('workoutContent').innerHTML=html;
}

function renderExCard(wk,sd,type,ex,isPlyo){
  const k=wkey(wk,sd,type,ex.id);
  const log=workoutLogs[k]||[];
  const logged=log.length>0;
  const ek=`${sd}_${type}_${ex.id}`;
  const open=expandedExercise===ek;
  const sc=logged?(isPlyo?'plyo-logged':'logged'):'';
  const saveClass=isPlyo?'save-plyo':'save-strength';
  const pClass=isPlyo?'plyo-input':'';
  let sum='';
  if(logged)sum=log.filter(s=>s.reps||s.weight).map((s,i)=>ex.weight&&s.weight?`${s.weight}lb×${s.reps}`:`S${i+1}:${s.reps}`).join(' · ');
  let logger='';
  if(open){
    const n=Math.max(ex.sets,log.length||1);
    let rows='';
    for(let i=0;i<n;i++){
      const e=log[i]||{};
      if(ex.weight!==false){
        rows+=`<div class="log-set-row"><div class="log-set-num">Set ${i+1}</div><div class="log-input-group"><div class="log-input-wrap"><div class="log-input-label">Weight lb</div><input class="log-input ${pClass}" type="number" inputmode="decimal" id="inp_${ek}_${i}_w" placeholder="lbs" value="${e.weight||''}"></div><div class="log-input-wrap"><div class="log-input-label">Reps</div><input class="log-input ${pClass}" type="number" inputmode="numeric" id="inp_${ek}_${i}_r" placeholder="${ex.reps}" value="${e.reps||''}"></div></div></div>`;
      }else{
        rows+=`<div class="log-set-row"><div class="log-set-num">Set ${i+1}</div><div class="log-input-group"><div class="log-input-wrap"><div class="log-input-label">Reps / Duration</div><input class="log-input ${pClass}" type="text" id="inp_${ek}_${i}_r" placeholder="${ex.reps}" value="${e.reps||''}"></div></div></div>`;
      }
    }
    logger=`<div class="ex-logger"><div class="log-sets">${rows}</div><div class="log-add-set"><button class="log-btn add" onclick="addSet('${wk}','${sd}','${type}','${ex.id}','${ek}')">+ Set</button><button class="log-btn ${saveClass}" onclick="saveLog('${wk}','${sd}','${type}','${ex.id}','${ek}')">Save</button>${logged?`<button class="log-btn clear" onclick="clearLog('${wk}','${sd}','${type}','${ex.id}')">✕</button>`:''}</div></div>`;
  }
  return `<div class="ex-card" id="excard_${ek}"><div class="ex-header" onclick="toggleEx('${ek}')"><div class="ex-status ${sc}">${logged?'✓':''}</div><div class="ex-info"><div class="ex-name">${ex.name}</div><div class="ex-prescribed">${ex.sets}×${ex.reps}${ex.weight?' · Log weight':' · Bodyweight'}</div>${logged?`<div class="ex-log-summary ${isPlyo?'plyo-color':'strength-color'}">${sum}</div>`:''}</div><div class="ex-chevron${open?' open':''}">›</div></div>${ex.notes?`<div class="ex-notes">${ex.notes}</div>`:''}${logger}</div>`;
}

function toggleEx(ek){expandedExercise=expandedExercise===ek?null:ek;renderWorkoutContent();setTimeout(()=>{const c=document.getElementById(`excard_${ek}`);if(c&&expandedExercise===ek)c.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}
function addSet(wk,sd,type,exId,ek){const k=wkey(wk,sd,type,exId);workoutLogs[k]=[...(workoutLogs[k]||[]),{reps:'',weight:''}];saveW();expandedExercise=ek;renderWorkoutContent();}
function saveLog(wk,sd,type,exId,ek){const sets=[];let i=0;while(document.getElementById(`inp_${ek}_${i}_r`)){const r=document.getElementById(`inp_${ek}_${i}_r`)?.value||'';const wt=document.getElementById(`inp_${ek}_${i}_w`)?.value||'';if(r||wt)sets.push({reps:r,weight:wt});i++;}if(sets.length){workoutLogs[wkey(wk,sd,type,exId)]=sets;saveW();}expandedExercise=null;renderWorkoutContent();renderSessionTabs();renderWorkoutWeekChips();}
function clearLog(wk,sd,type,exId){delete workoutLogs[wkey(wk,sd,type,exId)];saveW();expandedExercise=null;renderWorkoutContent();renderSessionTabs();renderWorkoutWeekChips();}

// ── STATS ─────────────────────────────────────────────────────────────────────
function renderStats(){
  const pct=Math.round(overallScore()*100);
  const c=2*Math.PI*32, off=c-(pct/100)*c;
  const wc=SCHEDULE.filter(w=>weekFullyDone(w)).length;
  const mi=SCHEDULE.filter(w=>weekFullyDone(w)).reduce((s,w)=>s+w.mi,0);
  const sl=new Set(Object.keys(workoutLogs).map(k=>{const p=k.split('_');return`${p[0]}_${p[1]}_${p[2]}`;})).size;
  const phases={};
  SCHEDULE.forEach(w=>{if(!phases[w.phase])phases[w.phase]={scores:[]};phases[w.phase].scores.push(weekScore(w));});
  let pr='';
  PHASE_ORDER.forEach(p=>{if(!phases[p])return;const scores=phases[p].scores;const pp=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length*100);pr+=`<div class="phase-row"><div class="phase-row-label">${p}</div><div class="phase-bar-wrap"><div class="phase-bar-fill" style="width:${pp}%;background:${phaseColor(p)}"></div></div><div class="phase-row-pct">${pp}%</div></div>`;});
  const ad=daysUntil(AMSTERDAM_DATE), pd=daysUntil(PHILLY_DATE);
  document.getElementById('statsContent').innerHTML=`<div class="stats-hero"><div class="big-ring"><svg width="76" height="76" viewBox="0 0 76 76"><circle class="big-ring-bg" cx="38" cy="38" r="32"/><circle class="big-ring-fill" cx="38" cy="38" r="32" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/></svg><div class="big-ring-text"><div class="big-ring-pct">${pct}%</div><div class="big-ring-sub">done</div></div></div><div><div class="stats-hero-title">Overall Progress</div><div class="stats-hero-sub">${wc} full weeks complete · ${mi} miles logged</div></div></div><div class="stats-grid"><div class="stat-card"><div class="stat-card-val" style="color:var(--green-text)">${wc}</div><div class="stat-card-label">Weeks Complete</div></div><div class="stat-card"><div class="stat-card-val" style="color:var(--amber-text)">${24-wc}</div><div class="stat-card-label">Weeks Remaining</div></div><div class="stat-card"><div class="stat-card-val" style="color:var(--blue-text)">${mi}</div><div class="stat-card-label">Miles Logged</div></div><div class="stat-card"><div class="stat-card-val" style="color:var(--plyo-text)">${sl}</div><div class="stat-card-label">Gym Sessions</div></div></div><div class="race-countdown"><div class="section-title">Race Countdowns</div><div class="countdown-item"><div class="countdown-race"><div class="race-dot amsterdam"></div><div><div class="countdown-name">Amsterdam Marathon</div><div class="countdown-sub">B Race · Oct 18, 2026</div></div></div><div><div class="countdown-num" style="color:var(--red)">${ad}</div><div class="countdown-days-label">days away</div></div></div><div class="countdown-item"><div class="countdown-race"><div class="race-dot philly"></div><div><div class="countdown-name">Philadelphia Marathon</div><div class="countdown-sub">A Race · Sub-3:10 · Nov 22</div></div></div><div><div class="countdown-num" style="color:var(--green-text)">${pd}</div><div class="countdown-days-label">days away</div></div></div></div><div class="phase-breakdown"><div class="section-title">By Phase</div>${pr}</div>`;
}

// ── PACING ────────────────────────────────────────────────────────────────────
function renderPacing(){
  document.getElementById('pacingContent').innerHTML=`<div class="pacing-card"><div class="pacing-card-header"><div class="pacing-dot" style="background:var(--blue)"></div><div class="pacing-card-title">EASY PACE</div></div><div class="pacing-pace" style="color:var(--blue-text)">8:30 – 9:00 /mi</div><div class="pacing-feel">Fully conversational. Complete sentences without effort.</div><div class="pacing-use">80%+ of all running in this plan.</div></div><div class="pacing-card"><div class="pacing-card-header"><div class="pacing-dot" style="background:var(--amber)"></div><div class="pacing-card-title">MARATHON PACE (M)</div></div><div class="pacing-pace" style="color:var(--amber-text)">7:10 – 7:20 /mi</div><div class="pacing-feel">Comfortably challenging. Short phrases when speaking. Your sub-3:10 race pace.</div><div class="pacing-use">Long run final segments, race simulation.</div></div><div class="pacing-card"><div class="pacing-card-header"><div class="pacing-dot" style="background:var(--red)"></div><div class="pacing-card-title">THRESHOLD PACE (T)</div></div><div class="pacing-pace" style="color:#e07060">6:45 – 6:50 /mi</div><div class="pacing-feel">Comfortably hard. 2–3 words max. ~25 min continuous max.</div><div class="pacing-use">Cruise intervals on quality days only.</div></div><div class="pacing-card"><div class="pacing-card-header"><div class="pacing-dot" style="background:var(--green)"></div><div class="pacing-card-title">STRIDES</div></div><div class="pacing-pace" style="color:var(--green-text)">6:00 – 6:20 /mi</div><div class="pacing-feel">Short controlled accelerations. Build 20m, hold 60m, coast 20m.</div><div class="pacing-use">100m each, full walk-back recovery.</div></div><div class="pacing-card"><div class="pacing-card-header"><div class="pacing-dot" style="background:#888"></div><div class="pacing-card-title">AMSTERDAM PACE</div></div><div class="pacing-pace" style="color:#aaa">7:40 – 7:50 /mi</div><div class="pacing-feel">B race controlled effort. Hold pace no matter how good you feel at mile 18.</div></div><div class="race-strategy"><div class="race-strategy-title">🏁 PHILLY RACE PLAN</div><div class="split-row"><div class="split-miles">Mi 1–5</div><div class="split-pace" style="color:var(--blue-text)">7:20–7:25</div><div class="split-note">Hold back. Downhill start — resist the crowd.</div></div><div class="split-row"><div class="split-miles">Mi 6–13</div><div class="split-pace" style="color:var(--amber-text)">7:15–7:20</div><div class="split-note">Settle in. Should feel easy — if not, back off.</div></div><div class="split-row"><div class="split-miles">Mi 14–18</div><div class="split-pace" style="color:var(--amber-text)">7:15–7:20</div><div class="split-note">Hold pace. This is where training pays off.</div></div><div class="split-row"><div class="split-miles">Mi 19–22</div><div class="split-pace" style="color:#e07060">By feel</div><div class="split-note">Shorten stride, increase cadence.</div></div><div class="split-row"><div class="split-miles">Mi 23–26.2</div><div class="split-pace" style="color:var(--green-text)">Everything</div><div class="split-note">Leave nothing on the course.</div></div></div><div class="race-strategy"><div class="race-strategy-title">💊 RACE FUEL</div><div class="split-row"><div class="split-miles">Mile 5</div><div class="split-pace" style="color:var(--amber-text)">Gel #1</div><div class="split-note">Don't wait until you feel you need it.</div></div><div class="split-row"><div class="split-miles">Mile 10</div><div class="split-pace" style="color:var(--amber-text)">Gel #2</div><div class="split-note">Stay on schedule. Water at every stop.</div></div><div class="split-row"><div class="split-miles">Mile 14</div><div class="split-pace" style="color:var(--amber-text)">Gel #3</div><div class="split-note"></div></div><div class="split-row"><div class="split-miles">Mile 18</div><div class="split-pace" style="color:var(--amber-text)">Gel #4</div><div class="split-note">Critical. This is where most people bonk.</div></div><div class="split-row"><div class="split-miles">Mile 22</div><div class="split-pace" style="color:var(--amber-text)">Gel #5</div><div class="split-note">Final gel. 4 miles to go.</div></div></div>`;
}

// ── OVERALL RING ──────────────────────────────────────────────────────────────
function updateOverall(){
  const pct=Math.round(overallScore()*100);
  const c=2*Math.PI*13, off=c-(pct/100)*c;
  const el=document.getElementById('overallRingFill');if(el)el.setAttribute('stroke-dashoffset',off.toFixed(2));
  const pe=document.getElementById('overallPct');if(pe)pe.textContent=pct+'%';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
load();
const fi=SCHEDULE.find(w=>!weekFullyDone(w));
if(fi){currentWorkoutWeek=fi.wk;const k=getSessionKeys(fi.wk);currentWorkoutSession=k[0]||null;}
showView('weeks');
</script>
</body>
</html>
